{% extends 'base.html' %}

{% block title %}Sign Up - Prompt Bazaar{% endblock %}

{% block content %}
<div class="auth-layout">
    <div class="floating-bg">
        <img src="https://res.cloudinary.com/dwv8kc9vb/image/upload/v1778937517/img1_s28pjt.png" class="floating-img img-1" alt="bg">
        <img src="https://res.cloudinary.com/dwv8kc9vb/image/upload/v1778937514/img2_qvkqbd.png" class="floating-img img-2" alt="bg">
        <img src="https://res.cloudinary.com/dwv8kc9vb/image/upload/v1778935629/Prompt_Bazaar_Logo_h4ga2c.png" class="floating-img img-3" alt="bg">
        <img src="https://res.cloudinary.com/dwv8kc9vb/image/upload/v1778937514/img2_qvkqbd.png" class="floating-img img-4" alt="bg">
    </div>
    <div class="card">
        <div class="text-center mb-6">
            <h1 class="logo mb-2">Prompt Bazaar</h1>
            <p class="text-secondary">Create your account to get started</p>
        </div>

        <button type="button" id="googleSignInBtn" class="btn btn-outline google-signin-btn mb-6">
            <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
            Sign up with Google
        </button>

        <div class="divider text-sm text-secondary">OR CONTINUE WITH</div>

        <form id="signup-form">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" type="text" id="username" required placeholder="johndoe">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" type="email" id="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label class="form-label" for="mobile">Mobile Number</label>
                <input class="form-control" type="tel" id="mobile" required placeholder="+1234567890">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Create Password</label>
                <input class="form-control" type="password" id="password" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm-password">Confirm Password</label>
                <input class="form-control" type="password" id="confirm-password" required placeholder="••••••••">
            </div>

            <div id="form-error" class="form-error mb-4"></div>

            <button type="submit" id="submit-btn" class="btn btn-primary mt-4">
                <span class="btn-text">Create Account</span>
                <div class="spinner"></div>
            </button>
        </form>

        <p class="text-center text-sm text-secondary mt-6 mb-0">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
